name: Bug report
description: Report a product bug with optional support bundle metadata
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what you expected
      placeholder: Describe the issue...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Exact steps to reproduce
      placeholder: 1. ... 2. ... 3. ...
    validations:
      required: true
  - type: input
    id: app_version
    attributes:
      label: App version
      placeholder: 2.1.29
  - type: input
    id: support_bundle_hash
    attributes:
      label: Support bundle SHA-256
      placeholder: abc123...
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics excerpt
      description: Paste sanitized diagnostics excerpt or attach support bundle
