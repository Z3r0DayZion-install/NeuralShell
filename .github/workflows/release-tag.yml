name: Release Tag

on:
  push:
    tags:
      - "v*-OMEGA*"

permissions:
  contents: write

jobs:
  release_windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate icons
        run: npm run icons:generate

      - name: Test
        run: npm test

      - name: Build installer
        run: npm run build

      - name: Generate release metadata
        run: |
          npm run benchmark:autonomy
          npm run release:manifest
          npm run release:status
          npm run release:checksums
          npm run release:verify:fresh:strict

      - name: Compose release notes
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $commit = $env:GITHUB_SHA
          $repo = $env:GITHUB_REPOSITORY
          $runId = $env:GITHUB_RUN_ID
          $runUrl = "https://github.com/$repo/actions/runs/$runId"
          $checksums = Get-Content -LiteralPath "release/checksums.txt" -Raw
          $notes = @"
          ## NeuralShell $tag

          Automated tag release generated by GitHub Actions.

          - Commit: $commit
          - Workflow run: $runUrl

          ### Artifact SHA-256
          $checksums
          "@
          Set-Content -LiteralPath "release/RELEASE_NOTES.md" -Value $notes -Encoding UTF8

      - name: Publish release assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          body_path: release/RELEASE_NOTES.md
          files: |
            dist/NeuralShell Setup *.exe
            dist/NeuralShell Setup *.exe.blockmap
            dist/OMEGA.yml
            release/manifest.json
            release/status.json
            release/autonomy-benchmark.json
            release/checksums.txt
            release/checksums.json
          fail_on_unmatched_files: true

      - name: Supersede previous stable releases
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $repo = $env:GITHUB_REPOSITORY
          $currentTag = $env:GITHUB_REF_NAME
          $headers = @{
            Authorization = "Bearer $($env:GITHUB_TOKEN)"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $releases = Invoke-RestMethod -Method GET -Headers $headers -Uri "https://api.github.com/repos/$repo/releases?per_page=100"
          foreach ($release in $releases) {
            if ($release.tag_name -eq $currentTag) { continue }
            if ($release.draft -eq $true) { continue }
            if ($release.prerelease -eq $true) { continue }
            if (-not ($release.tag_name -like "v*-OMEGA*")) { continue }

            $prefix = "Superseded by ``$currentTag``."
            $supNote = "$prefix`n`nUse the latest stable release:`nhttps://github.com/$repo/releases/tag/$currentTag"
            $body = [string]$release.body
            if ($body.Contains($prefix)) { continue }
            $newBody = if ([string]::IsNullOrWhiteSpace($body)) { $supNote } else { "$supNote`n`n---`n`n$body" }

            $name = [string]$release.name
            if (-not $name.EndsWith("(Superseded)")) {
              $name = "$name (Superseded)"
            }

            $payload = @{
              name = $name
              prerelease = $true
              body = $newBody
            } | ConvertTo-Json

            Invoke-RestMethod -Method PATCH -Headers $headers -Uri "https://api.github.com/repos/$repo/releases/$($release.id)" -Body $payload -ContentType "application/json"
          }
