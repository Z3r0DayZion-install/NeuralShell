name: verify-windows

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install (locked)
        run: npm ci

      - name: Verify spine
        run: npm run verify:all

      - name: Upload proofs
        uses: actions/upload-artifact@v4
        with:
          name: proofs-${{ github.run_id }}
          path: |
            state/proofs
            state/proof_bundles

