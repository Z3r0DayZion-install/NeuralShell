name: Merge Gate

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Verify strict clean worktree
        run: npm run release:worktree:strict

      - name: Run lint
        run: npm run lint

      - name: Run full test suite
        run: npm test
