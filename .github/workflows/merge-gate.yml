name: Merge Gate

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Verify strict clean worktree
        run: npm run release:worktree:strict

      - name: Run lint
        run: npm run lint

      - name: Run flaky test gate
        run: npm run test:flaky

      - name: Run coverage gate
        run: npm run coverage:check

  ship_readiness:
    runs-on: windows-latest
    needs: gate
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run e2e founder flows
        run: npm run test:e2e

      - name: Verify ship readiness
        env:
          NEURALSHELL_SKIP_SOURCE_INTEGRITY: "1"
          NEURAL_RELEASE_SMOKE_TIMEOUT_MS: "60000"
        run: npm run verify:ship
