name: Release Contract

on:
  pull_request:
  workflow_dispatch:

jobs:
  release_contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Run release contract tests
        run: |
          node tear/release-manifest.test.js
          node tear/ship-entrypoints.test.js
          node tear/release-freshness.test.js

      - name: Seed lightweight release fixture
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const files = [
            "dist/NeuralShell Setup 5.0.0.exe",
            "dist/win-unpacked/NeuralShell.exe",
            "dist/win-unpacked/resources/app.asar",
            "dist/win-unpacked/resources/app-update.yml"
          ];
          for (let i = 0; i < 24; i += 1) {
            files.push(`dist/win-unpacked/locales/fixture-${String(i).padStart(2, "0")}.pak`);
          }

          for (const relPath of files) {
            const absPath = path.join(process.cwd(), relPath);
            fs.mkdirSync(path.dirname(absPath), { recursive: true });
            if (!fs.existsSync(absPath)) {
              fs.writeFileSync(absPath, `fixture:${relPath}\n`, "utf8");
            }
          }
          NODE

      - name: Seed benchmark fixture
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const out = path.join(process.cwd(), "release", "autonomy-benchmark.json");
          fs.mkdirSync(path.dirname(out), { recursive: true });
          fs.writeFileSync(
            out,
            `${JSON.stringify({
              generatedAt: new Date().toISOString(),
              score: 100,
              max: 100,
              percent: 100,
              verdict: "elite",
              checks: []
            }, null, 2)}\n`,
            "utf8"
          );
          NODE

      - name: Build release metadata and verify freshness
        run: |
          npm run release:manifest
          npm run release:status
          npm run release:verify:fresh
