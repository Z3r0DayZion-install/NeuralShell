name: CI Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint:js

      - name: Test
        run: npm test

      - name: Build Installer
        run: npm run build:win

      - name: Build Portable
        run: npm run build:portable

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neuralshell-artifacts
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
