name: Router CI

on:
  push:
    paths:
      - "router.js"
      - "src/router/**"
      - "test/**"
      - "package.json"
      - ".github/workflows/router-ci.yml"
  pull_request:
    paths:
      - "router.js"
      - "src/router/**"
      - "test/**"
      - "package.json"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run test:contract
      - run: npm run test:chaos
      - run: npm run test:root
      - run: npm run proof:runtime
      - run: npm run proof:spawn
      - run: npm run bench:router
