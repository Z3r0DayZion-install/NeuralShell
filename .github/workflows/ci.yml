name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Generate icons
        run: npm run icons:generate

      - name: Run flaky test gate
        run: npm run test:flaky

      - name: Run coverage gate
        run: npm run coverage:check

  build_windows:
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Verify ship readiness
        run: npm run verify:ship

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: neuralshell-win
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/OMEGA.yml
            dist/latest.yml
            release/manifest.sig
            release/manifest.pub
            release/signature-verification.json
            release/packaged-smoke-report.json
            release/security-pass.json
            release/canary-gate.json
            release/performance-gate.json
            release/operator-kpi.json
            release/slo-gate.json
