name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate icons
        run: npm run icons:generate

      - name: Run tests
        run: npm test

  build_windows:
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Generate icons
        run: npm run icons:generate

      - name: Build installer
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neuralshell-win
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
