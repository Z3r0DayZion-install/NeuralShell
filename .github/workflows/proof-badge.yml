name: Proof Badge

on:
  push:
    tags:
      - "neuralshell-v*"
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_publish_badge:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT_PAGES || github.token }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build proof manifest bundle
        run: npm run proof:bundle

      - name: Generate proof badge SVG
        run: npm run proof:badge

      - name: Publish badge to badges branch
        shell: bash
        run: |
          set -euo pipefail
          test -f release/proof_badge.svg

          tmpdir="$(mktemp -d)"
          cp release/proof_badge.svg "$tmpdir/proof_badge.svg"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin badges >/dev/null 2>&1; then
            git fetch origin badges
            git checkout -B badges origin/badges
          else
            git checkout --orphan badges
            find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          fi

          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp "$tmpdir/proof_badge.svg" ./proof_badge.svg

          git add proof_badge.svg
          if git diff --cached --quiet; then
            echo "No badge update required."
            exit 0
          fi

          git commit -m "chore: update proof badge"
          git push origin badges
