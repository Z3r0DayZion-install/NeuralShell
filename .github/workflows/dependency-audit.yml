name: Dependency Audit & SBOM Gate

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: NPM Security Audit
        run: npm audit --audit-level=high

      - name: Verify SBOM Alignment
        run: |
          if [ ! -f "artifacts/sbom/latest.json" ]; then
            echo "Error: SBOM missing. Run 'npm run sbom:generate' if local."
            exit 1
          fi
          echo "SBOM exists: artifacts/sbom/latest.json"
