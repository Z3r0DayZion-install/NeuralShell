<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NeuralShell Docs Portal</title>
  <style>
    :root {
      --bg: #071019;
      --panel: #0d1824;
      --line: rgba(255, 255, 255, 0.12);
      --text: #d6e2f0;
      --muted: #8ea1b7;
      --accent: #2cd4d4;
      --ok: #22c55e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 20%, #112538 0%, var(--bg) 45%, #04070b 100%);
      min-height: 100vh;
    }
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 28px 18px 44px;
    }
    .header {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .title {
      margin: 0;
      font-size: 1.5rem;
      letter-spacing: 0.01em;
    }
    .sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.75rem;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.02);
    }
    .badge.ok {
      color: #d8ffe4;
      border-color: rgba(34, 197, 94, 0.4);
      background: rgba(34, 197, 94, 0.12);
    }
    .search {
      margin: 14px 0 18px;
    }
    .search input {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.32);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.95rem;
      outline: none;
    }
    .search input:focus {
      border-color: rgba(44, 212, 212, 0.65);
      box-shadow: 0 0 0 3px rgba(44, 212, 212, 0.12);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      padding: 12px;
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .list a {
      display: block;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      padding: 9px 10px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.02);
    }
    .list a:hover {
      border-color: rgba(44, 212, 212, 0.45);
      background: rgba(44, 212, 212, 0.08);
    }
    .path {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.72rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      word-break: break-all;
    }
    .empty {
      padding: 16px;
      border: 1px dashed var(--line);
      border-radius: 10px;
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
      background: rgba(255, 255, 255, 0.01);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1 class="title">NeuralShell Docs Portal</h1>
        <p class="sub">Install, security, proofing, deployment, billing, support, release, growth, and policy docs in one searchable page.</p>
      </div>
      <div class="badge-row">
        <span class="badge ok">Proof-First</span>
        <span class="badge">Offline-First</span>
        <span class="badge">Founder Beta</span>
      </div>
    </div>

    <div class="search">
      <input id="search" type="search" placeholder="Search docs by section, title, or path..." aria-label="Search docs" />
    </div>

    <div id="grid" class="grid" aria-live="polite"></div>
  </div>

  <script>
    const grid = document.getElementById('grid');
    const search = document.getElementById('search');

    function safeArray(value) {
      return Array.isArray(value) ? value : [];
    }

    function normalizeText(value) {
      return String(value || '').toLowerCase();
    }

    function renderSections(sections, query) {
      const q = normalizeText(query).trim();
      const safeSections = safeArray(sections);
      const blocks = [];

      for (const section of safeSections) {
        const links = safeArray(section && section.links);
        const filteredLinks = links.filter((link) => {
          if (!q) return true;
          const haystack = [
            section && section.title,
            section && section.id,
            link && link.label,
            link && link.path,
          ].map(normalizeText).join(' ');
          return haystack.includes(q);
        });

        if (!filteredLinks.length) continue;

        const items = filteredLinks.map((link) => {
          const label = String(link && link.label ? link.label : 'Untitled');
          const rawPath = String(link && link.path ? link.path : '#');
          const href = rawPath.startsWith('docs/') ? rawPath.slice(5) : rawPath;
          const pathText = String(link && link.path ? link.path : '');
          return `<li><a href="../${href}" target="_blank" rel="noreferrer">${label}<span class="path">${pathText}</span></a></li>`;
        }).join('');

        blocks.push(`
          <section class="card">
            <h2>${String(section && section.title ? section.title : 'Section')}</h2>
            <ul class="list">${items}</ul>
          </section>
        `);
      }

      if (!blocks.length) {
        grid.innerHTML = '<div class="empty">No documents match this search.</div>';
        return;
      }

      grid.innerHTML = blocks.join('');
    }

    async function boot() {
      try {
        const response = await fetch('./nav.json', { cache: 'no-store' });
        const payload = await response.json();
        const sections = safeArray(payload && payload.sections);
        renderSections(sections, '');
        search.addEventListener('input', () => {
          renderSections(sections, search.value);
        });
      } catch (err) {
        grid.innerHTML = `<div class="empty">Failed to load docs nav: ${String(err && err.message ? err.message : err)}</div>`;
      }
    }

    boot();
  </script>
</body>
</html>
