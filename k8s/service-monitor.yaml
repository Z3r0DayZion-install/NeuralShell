apiVersion: v1
kind: ServiceMonitor
metadata:
  name: neuralshell-metrics
  namespace: default
  labels:
    app: neuralshell
    prometheus: kube-prometheus
spec:
  selector:
    matchLabels:
      app: neuralshell
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      scheme: http

---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: neuralshell-alerts
  namespace: default
  labels:
    app: neuralshell
    prometheus: kube-prometheus
spec:
  groups:
    - name: neuralshell.rules
      interval: 30s
      rules:
        # High error rate alert
        - alert: HighErrorRate
          expr: |
            rate(neuralshell_router_requests_errors_total[5m]) > 0.05
          for: 5m
          labels:
            severity: warning
            component: neuralshell
          annotations:
            summary: "High error rate detected"
            description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

        # High latency alert
        - alert: HighLatency
          expr: |
            histogram_quantile(0.95, rate(neuralshell_router_request_duration_ms_bucket[5m])) > 2000
          for: 5m
          labels:
            severity: warning
            component: neuralshell
          annotations:
            summary: "High request latency detected"
            description: "P95 latency is {{ $value }}ms"

        # Endpoint down alert
        - alert: EndpointDown
          expr: |
            neuralshell_router_upstream_cooldown == 1
          for: 2m
          labels:
            severity: critical
            component: neuralshell
          annotations:
            summary: "Endpoint {{ $labels.endpoint }} is down"
            description: "Endpoint has been in cooldown for 2+ minutes"

        # High memory usage
        - alert: HighMemoryUsage
          expr: |
            neuralshell_router_memory_usage_bytes{type="heapUsed"} / neuralshell_router_memory_usage_bytes{type="heapTotal"} > 0.9
          for: 5m
          labels:
            severity: warning
            component: neuralshell
          annotations:
            summary: "High memory usage detected"
            description: "Memory usage is {{ $value | humanizePercentage }}"

        # Rate limit exceeded
        - alert: HighRateLimitHits
          expr: |
            rate(neuralshell_router_rate_limits_total[5m]) > 10
          for: 5m
          labels:
            severity: info
            component: neuralshell
          annotations:
            summary: "High rate limit hits"
            description: "Rate limit hits: {{ $value }} per second"

        # Circuit breaker open
        - alert: CircuitBreakerOpen
          expr: |
            neuralshell_router_circuit_breaker_state_changes{state="open"} > 0
          for: 1m
          labels:
            severity: warning
            component: neuralshell
          annotations:
            summary: "Circuit breaker opened for {{ $labels.endpoint }}"
            description: "Circuit breaker has opened, indicating endpoint issues"

        # No active endpoints
        - alert: NoActiveEndpoints
          expr: |
            sum(neuralshell_router_upstream_cooldown) == count(neuralshell_router_upstream_cooldown)
          for: 1m
          labels:
            severity: critical
            component: neuralshell
          annotations:
            summary: "No active endpoints available"
            description: "All endpoints are in cooldown or unavailable"

        # Budget exceeded
        - alert: BudgetExceeded
          expr: |
            neuralshell_router_cost_total > 100
          for: 1h
          labels:
            severity: warning
            component: neuralshell
          annotations:
            summary: "Cost budget exceeded"
            description: "Total cost: ${{ $value }}"

        # Anomaly detected
        - alert: AnomalyDetected
          expr: |
            rate(neuralshell_router_anomalies_total[5m]) > 0.1
          for: 5m
          labels:
            severity: info
            component: neuralshell
          annotations:
            summary: "Traffic anomaly detected"
            description: "Anomaly detection rate: {{ $value }} per second"

        # Security threat detected
        - alert: SecurityThreatDetected
          expr: |
            rate(neuralshell_router_threats_total[5m]) > 1
          for: 2m
          labels:
            severity: warning
            component: neuralshell
          annotations:
            summary: "Security threats detected"
            description: "Threat detection rate: {{ $value }} per second"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: neuralshell-grafana-dashboard
  namespace: default
  labels:
    grafana_dashboard: "1"
data:
  neuralshell-dashboard.json: |
    {
      "dashboard": {
        "title": "NeuralShell Autonomous Systems",
        "tags": ["neuralshell", "autonomous"],
        "timezone": "browser",
        "panels": [
          {
            "title": "Request Rate",
            "targets": [
              {
                "expr": "rate(neuralshell_router_requests_total[5m])"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Error Rate",
            "targets": [
              {
                "expr": "rate(neuralshell_router_requests_errors_total[5m])"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Latency (P95)",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, rate(neuralshell_router_request_duration_ms_bucket[5m]))"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Auto-Scaling Status",
            "targets": [
              {
                "expr": "kube_deployment_status_replicas{deployment=\"neuralshell\"}"
              }
            ],
            "type": "stat"
          },
          {
            "title": "Self-Healing Events",
            "targets": [
              {
                "expr": "rate(neuralshell_router_healing_attempts_total[5m])"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Cost Tracking",
            "targets": [
              {
                "expr": "neuralshell_router_cost_total"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Anomalies Detected",
            "targets": [
              {
                "expr": "rate(neuralshell_router_anomalies_total[5m])"
              }
            ],
            "type": "graph"
          },
          {
            "title": "Security Threats",
            "targets": [
              {
                "expr": "rate(neuralshell_router_threats_total[5m])"
              }
            ],
            "type": "graph"
          }
        ]
      }
    }
