apiVersion: v1
kind: Namespace
metadata:
  name: neuralshell
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: neuralshell-config
  namespace: neuralshell
data:
  config.yaml: |
    version: "1.0.0"
    server:
      port: 3000
      host: "0.0.0.0"
      timeoutMs: 5000
      maxConcurrent: 100
    endpoints: []
    routing:
      strategy: "adaptive"
      adaptive: true
    circuitBreaker:
      enabled: true
      failureThreshold: 5
      timeoutMs: 30000
    cache:
      enabled: true
      ttlSeconds: 300
    monitoring:
      prometheusEnabled: true
      prometheusPort: 9090
---
apiVersion: v1
kind: Secret
metadata:
  name: neuralshell-secrets
  namespace: neuralshell
type: Opaque
stringData:
  ADMIN_TOKEN: "${ADMIN_TOKEN}"
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuralshell
  namespace: neuralshell
spec:
  replicas: 3
  selector:
    matchLabels:
      app: neuralshell
  template:
    metadata:
      labels:
        app: neuralshell
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: neuralshell
        image: neuralshell:latest
        ports:
        - containerPort: 3000
        - containerPort: 9090
        env:
        - name: NODE_ENV
          value: "production"
        - name: ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              name: neuralshell-secrets
              key: ADMIN_TOKEN
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: neuralshell-secrets
              key: OPENAI_API_KEY
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: config
          mountPath: /config
      volumes:
      - name: config
        configMap:
          name: neuralshell-config
---
apiVersion: v1
kind: Service
metadata:
  name: neuralshell
  namespace: neuralshell
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
  selector:
    app: neuralshell
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: neuralshell
  namespace: neuralshell
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: neuralshell
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: neuralshell
  namespace: neuralshell
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: api.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: neuralshell
            port:
              number: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: neuralshell
  namespace: neuralshell
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: neuralshell
  namespace: neuralshell
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: neuralshell
  namespace: neuralshell
subjects:
- kind: ServiceAccount
  name: neuralshell
roleRef:
  kind: Role
  name: neuralshell
  apiGroup: rbac.authorization.k8s.io
