apiVersion: v1
kind: Namespace
metadata:
  name: neuralshell

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: neuralshell-config
  namespace: neuralshell
data:
  NODE_ENV: "production"
  REQUEST_TIMEOUT_MS: "5000"
  MAX_CONCURRENT_REQUESTS: "32"
  REQUESTS_PER_WINDOW: "120"
  RATE_LIMIT_WINDOW_MS: "60000"
  ENABLE_SECURITY_HEADERS: "true"
  PERSIST_VOLATILE_STATE: "true"
  ROUTER_ENDPOINTS_JSON: |
    [
      {
        "name": "ollama-local",
        "url": "http://ollama-service:11434/api/generate",
        "model": "llama3"
      }
    ]

---
apiVersion: v1
kind: Secret
metadata:
  name: neuralshell-secrets
  namespace: neuralshell
type: Opaque
stringData:
  ADMIN_TOKEN: "change-me-to-strong-secret"
  PROMPT_API_TOKEN: "change-me-to-strong-secret"
  OPENAI_API_KEY: ""

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neuralshell-router
  namespace: neuralshell
  labels:
    app: neuralshell-router
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: neuralshell-router
  template:
    metadata:
      labels:
        app: neuralshell-router
        version: v1
    spec:
      serviceAccountName: neuralshell-router
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      containers:
      - name: router
        image: neuralshell:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: neuralshell-config
              key: NODE_ENV
        - name: REQUEST_TIMEOUT_MS
          valueFrom:
            configMapKeyRef:
              name: neuralshell-config
              key: REQUEST_TIMEOUT_MS
        - name: MAX_CONCURRENT_REQUESTS
          valueFrom:
            configMapKeyRef:
              name: neuralshell-config
              key: MAX_CONCURRENT_REQUESTS
        - name: REQUESTS_PER_WINDOW
          valueFrom:
            configMapKeyRef:
              name: neuralshell-config
              key: REQUESTS_PER_WINDOW
        - name: ENABLE_SECURITY_HEADERS
          valueFrom:
            configMapKeyRef:
              name: neuralshell-config
              key: ENABLE_SECURITY_HEADERS
        - name: ROUTER_ENDPOINTS_JSON
          valueFrom:
            configMapKeyRef:
              name: neuralshell-config
              key: ROUTER_ENDPOINTS_JSON
        - name: ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              name: neuralshell-secrets
              key: ADMIN_TOKEN
        - name: PROMPT_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: neuralshell-secrets
              key: PROMPT_API_TOKEN
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: neuralshell-secrets
              key: OPENAI_API_KEY

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2

        volumeMounts:
        - name: state
          mountPath: /app/state

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          capabilities:
            drop:
            - ALL

      volumes:
      - name: state
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: neuralshell-router-service
  namespace: neuralshell
  labels:
    app: neuralshell-router
spec:
  type: ClusterIP
  selector:
    app: neuralshell-router
  ports:
  - name: http
    port: 3000
    targetPort: http
    protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: neuralshell-router-hpa
  namespace: neuralshell
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: neuralshell-router
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: neuralshell-router-pdb
  namespace: neuralshell
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: neuralshell-router

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ServiceAccount
metadata:
  name: neuralshell-router
  namespace: neuralshell

---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: neuralshell
spec:
  type: ExternalName
  externalName: ollama.external
  ports:
  - port: 11434
    targetPort: 11434
