<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Recovery Mode</title>
  <style>
    body { font-family: sans-serif; background: #1a0000; color: #ff4d4d; padding: 20px; }
    h1 { border-bottom: 1px solid #ff4d4d; }
    .btn { background: #ff4d4d; color: white; border: none; padding: 10px 20px; cursor: pointer; margin-right: 10px; }
    .btn:hover { background: #ff1a1a; }
    #report { background: rgba(0,0,0,0.5); padding: 10px; margin: 20px 0; font-family: monospace; white-space: pre-wrap; height: 200px; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>⚠️ Integrity Violation</h1>
  <p>NeuralShell has detected tampering or corruption in critical system files. Access has been restricted to prevent further compromise.</p>
  
  <div id="report">Loading integrity report...</div>

  <button id="repairBtn" class="btn">Attempt Self-Healing Repair</button>
  <button id="restartBtn" class="btn">Restart Application</button>

  <script src="recovery.js"></script>
</body>
</html>
