<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>NeuralShell Companion</title>
  <style>
    body { margin:0; font-family: ui-sans-serif, system-ui; background:#020617; color:#e2e8f0; }
    main { padding:20px; }
    .card { border:1px solid #1e293b; border-radius:12px; padding:14px; background:#0f172a; margin-bottom:12px; }
    button { background:#164e63; color:#cffafe; border:1px solid #155e75; border-radius:10px; padding:8px 10px; }
  </style>
</head>
<body>
  <main>
    <h1>NeuralShell Mobile Companion</h1>
    <div class="card">
      <strong>Thread Viewer</strong>
      <p>View active threads, run slash commands, and monitor proof alerts from your phone.</p>
      <button id="mockAlertBtn">Mock Local Alert</button>
    </div>
    <pre id="log"></pre>
  </main>
  <script type="module">
    const log = document.getElementById('log');
    document.getElementById('mockAlertBtn').addEventListener('click', async () => {
      if ('Notification' in window) {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          new Notification('NeuralShell Proof Alert', { body: 'Mock proof alert from local PWA runtime.' });
          log.textContent = 'Mock notification sent.';
          return;
        }
      }
      log.textContent = 'Notification permission denied.';
    });
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./serviceWorker.js');
    }
  </script>
</body>
</html>
